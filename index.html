<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desconto de renda</title>
</head>
<body>
    <div id="geral">
        <p>São isentas as pessoas menor de idade e com renda de até R$ 1700,00</p>
       <p> De 1701, Até 5000,00 -> 5%</p> 
        <p> De R$ 5001,00 até 8000,00 -> 8%</p>
        <p> De R$ 8001,00 até 10000,00 -> 10%</p>
        <p> De R$ 10001,00 em dia -> 3% </p>

        <h3>Desconto nas renda</h3>

        <link rel="stylesheet" href="css/style.css">
    
        <div id="div-form">
            <form>
                <label for="nome"> Nome </label>
                <input type="text" name="nome" id="nome"> <br>
    
                <label for="idade"> Idade </label>
                <input type="text" name="idade" id="idade"> <br>
    
    
                <label for="renda"> Renda </label>
                <input type="text" name="renda" id="renda"> <br>
    
    
                <button type="submit">Adicionar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>
    
        <div id="div-lista-pessoas">
             Maria, 25, 5000, 250, 00
             Jorge, 34, 1500, isento

     
        </div>
    </div>
</body>
</html>
