<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desconto de renda</title>
</head>
<body>
    <div id="geral">
        <p>São insentos as pessoas menor de idade e com renda de até R$ 1700,00</p>
       <p> Até 5000,00 -> 5%</p> 
        <p> De R$ 5001,00 até 8000,00 -> 8%</p>
        <p> De R$ 8001,00 até 10000,00 -> 10%</p>
        <p> De R$ 10001,00 em dia -> 3% </p>

        <h3>Desconto nas renda</h3>
    
        <div id="div-form">
            <form>
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome">
    
                <label for="idade">Idade</label>
                <input type="text" name="idade" id="idade">
    
                <label for="renda">Renda</label>
                <input type="text" name="renda" id="renda">
    
                <button type="submit">Adicionar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>
    
        <div id="div-lista-pessoas">
    
        </div>
    </div>
</body>
</html>
